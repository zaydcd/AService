        background: rgba(0, 0, 0, 0.8);

        padding: 10px 16px;

      }

      }
      .map-wrapper {
        margin-top: 10px;
        border-radius: 8px;
        overflow: hidden;
        height: 75%;
        color: darkcyan;
      }
      iframe {
        width: 100%;
        min-height: 100%;
        border: 0;
      }

      footer {
        background: rgba(0, 0, 0, 0.85);
        color: #ccc;
        text-align: center;
        padding: 10px 16px;
        font-size: 14px;
      }
      footer a {
        color: #00ccff;
        text-decoration: none;
        margin: 0 5px;
      }

      @media (max-width: 600px) {
        header {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
